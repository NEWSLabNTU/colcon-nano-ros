[package]
name = "colcon-nano-ros"
version = "0.4.0"
edition = "2021"
license = "Apache-2.0"
authors = ["Lin Hsiang-Jui <jerry73204@gmail.com>"]
description = "Extension for colcon to build nano-ros packages with automatic message type generation"

[lib]
name = "cargo_ros2_py"
crate-type = ["cdylib"]

[dependencies]
# PyO3 bindings to expose cargo-ros2 functionality to Python
pyo3 = { version = "0.22", features = ["extension-module"] }
cargo-ros2 = { path = "../cargo-ros2" }
