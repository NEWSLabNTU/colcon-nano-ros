[build-system]
requires = ["maturin>=1.9,<2.0"]
build-backend = "maturin"

[project]
name = "colcon-nano-ros"
version = "0.4.0"
description = "Extension for colcon to build nros packages with automatic message type generation"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache-2.0" }
authors = [
    { name = "Lin Hsiang-Jui", email = "jerry73204@gmail.com" }
]
keywords = [
    "ROS",
    "ROS2",
    "Rust",
    "colcon",
    "build-tool",
    "robotics",
    "message-generation",
    "bindings"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Plugins",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: MacOS",
    "Operating System :: Microsoft :: Windows",
    "Operating System :: POSIX",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Software Development :: Build Tools",
    "Topic :: Software Development :: Code Generators",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "colcon-core",
    "colcon-library-path",
    "colcon-ros",
]

[project.urls]
Homepage = "https://github.com/azewiusz/colcon-nano-ros"
Repository = "https://github.com/azewiusz/colcon-nano-ros"
Documentation = "https://github.com/azewiusz/colcon-nano-ros#readme"
Issues = "https://github.com/azewiusz/colcon-nano-ros/issues"
Changelog = "https://github.com/azewiusz/colcon-nano-ros/releases"

[project.entry-points."colcon_core.package_augmentation"]
"ros.ament_cargo" = "colcon_nano_ros.package_augmentation:RustBindingAugmentation"

[project.entry-points."colcon_core.task.build"]
"ros.ament_cargo" = "colcon_nano_ros.task.ament_cargo.build:AmentCargoBuildTask"

[project.entry-points."colcon_core.task.test"]
"ros.ament_cargo" = "colcon_nano_ros.task.ament_cargo.test:AmentCargoTestTask"

[tool.maturin]
bindings = "pyo3"
manifest-path = "Cargo.toml"
module-name = "colcon_nano_ros.cargo_ros2_py"
python-source = "."
strip = true
