[package]
name = "nros-cli"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "The `nros` user-facing CLI for nano-ros: scaffolding, codegen, build, run, doctor."

[[bin]]
name = "nros"
path = "src/main.rs"

[features]
default = []
# Surface maintainer-only release subcommands.
release = ["nros-cli-core/release"]

[dependencies]
clap = { workspace = true }
eyre = "0.6"
nros-cli-core = { path = "../nros-cli-core" }
